<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #b30000; /* reddish background */
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    overflow: hidden;
}

/* Title */
.title {
    color: white;
    font-size: 52px;
    letter-spacing: 1px;
    text-align: center;
    margin-top: 10px;
}

/* Back button */
.back {
    position: absolute;
    top: 20px;
    left: 20px;
    color: white;
    text-decoration: none;
    font-size: 18px;
    font-weight: 500;
}

/* Container for logo + animation */
.container {
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* Logo above title */
.logo {
    width: 25vw;      /* responsive size */
    max-width: 300px; /* prevents it from getting too big on desktop */
    margin-bottom: 5px;
}

/* Chicken image animation */
.chicken {
    width: 120px;
    position: absolute;
    bottom: 50px;
    left: 0; /* start near left edge */
    animation: runChicken 4.4s linear infinite; /* 10% slower (4s → 4.4s) */
}

/* Move chicken left → right and flip only at edges */
@keyframes runChicken {
    0% {
        left: 0;
        transform: scaleX(-1); /* start facing right */
    }
    50% {
        left: calc(100% - 140px); /* right edge, subtract chicken width */
        transform: scaleX(-1);     /* still facing right */
    }
    51% {
        transform: scaleX(1);    /* flip instantly at edge */
    }
    100% {
        left: 0;                  /* back to left */
        transform: scaleX(1);    /* facing left */
    }
}

@media screen and (max-width: 480px) {

    .logo {
        width: 80px;
        margin-bottom: 15px;
    }

    .title {
        font-size: 28px;
    }

    .chicken {
        width: 80px;
        bottom: 30px;
    }

    .back {
        font-size: 14px;
        top: 10px;
        left: 10px;
    }
}

</style>

<!-- Back button -->
<a href="index.html" class="back">← Back</a>

<div class="container">

    <!-- Logo -->
    <img src="emoji.png" alt="Logo" class="logo">
    
    <div class="title">
       you`ve been chickn`d
    </div>

    <!-- Animated chicken image -->
    <img src="chkn.png" alt="Chicken" class="chicken">

</div>
