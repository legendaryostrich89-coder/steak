<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;

    background: 
        linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.35)),
        url("plate.png") no-repeat center center/cover;

    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
}

/* Container */
.container {
    padding: 20px;
}

/* Logo */
.logo {
    width: 300px; /* smaller base size */
    max-width: 70vw; /* scales nicely on phones */
    margin-bottom: 25px;
}

/* Button */
.button {
    display: inline-block;
    padding: 14px 40px; /* slightly tighter */
    font-size: 18px;
    border-radius: 40px;
    background-color: #A62800;
    color: #fff;
    text-decoration: none;
    transition: all 0.25s ease;
}

/* ===== 📱 MOBILE TWEAKS (subtle, not drastic) ===== */
@media screen and (max-width: 480px) {

    .logo {
        width: 220px; /* still prominent */
    }

    .button {
        font-size: 16px;
        padding: 12px 28px;
    }
}
</style>

<div class="container">

<img src="cow.png" alt="Cow Logo" class="logo">

<a href="steak.html" class="button">Book steak date 🤤</a>

</div>
