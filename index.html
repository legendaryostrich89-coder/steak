<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;

    /* Background image with overlay */
    background: 
        linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.35)),
        url("plate.png") no-repeat center center/cover;
    background-size: 60vw;

    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
}

/* Main container */
.container {
    padding: 30px 20px;
    background: transparent;
    box-shadow: none;
}

/* Logo */
.logo {
    width: 40vw;       /* responsive */
    max-width: 500px;  /* caps size on desktop */
    margin-bottom: 30px;
    display: block;
    margin-left: auto;
    margin-right: auto;
}
/* Button */
.button {
    display: inline-block;
    padding: 16px 50px;
    font-size: 20px;
    font-weight: 500;
    text-decoration: none;
    border-radius: 40px;
    background-color: #A62800;
    color: #ffffff;
    transition: all 0.25s ease;
}

@media screen and (max-width: 480px) {

    .logo {
        width: 120px;
        margin-bottom: 20px;
    }

    .button {
        font-size: 16px;
        padding: 14px 30px;
    }

    body {
        padding: 10px;
    }
}

</style>

<div class="container">

<img src="cow.png" alt="Cow Logo" class="logo">

<a href="steak.html" class="button">Book steak date 🤤</a>

</div>
